services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${REACT_PORT}:5173"
    env_file:
      - .env.dev

  public-api:
    build:
      context: .
      dockerfile: backend/Dockerfile.public.dev
    working_dir: /src/backend/PublicApi
    volumes:
      - ./backend/PublicApi:/src/backend/PublicApi
      - ./backend/CSLib:/src/backend/CSLib
      - ./backend/Repository:/src/backend/Repository
    ports:
      - "${PUBLIC_API_PORT}:5000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${POSTGRES_PORT}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5000
      DOTNET_USE_POLLING_FILE_WATCHER: true

  private-api:
    build:
      context: .
      dockerfile: backend/Dockerfile.private.dev
    working_dir: /src/backend/PrivateApi
    volumes:
      - ./backend/PrivateApi:/src/backend/PrivateApi
      - ./backend/CSLib:/src/backend/CSLib
      - ./backend/Repository:/src/backend/Repository
    ports:
      - "${PRIVATE_API_PORT}:5000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${POSTGRES_PORT}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5000
      DOTNET_USE_POLLING_FILE_WATCHER: true

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infrastructure/db/init:/docker-entrypoint-initdb.d
    ports:
      - "${HOST_DB_PORT}:${POSTGRES_PORT}"

  nginx:
    build:
      context: .
      dockerfile: ./infrastructure/nginx/Dockerfile.dev
    depends_on:
      - frontend
      - private-api
      - public-api
    ports:
      - "${NGINX_HTTP_PORT}:80"

  batch-auto-battle:
    build:
      context: .
      dockerfile: ./batch/AutoBattle/Dockerfile.dev
    restart: "no"

  batch-guitar-crawler:
    build:
      context: ./batch/webCrawler
      dockerfile: Dockerfile.dev
    restart: "no"
    volumes:
     - ./batch/webCrawler/logs:/app/logs
    environment:
      ENV_FILE: .env.dev