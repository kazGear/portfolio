services:
  nginx:
    build:
      context: .
      dockerfile: ./infrastructure/nginx/Dockerfile.prod
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt:ro
    restart: always
    command: >
      /bin/sh -c '
        while :; do
          sleep 12h
          nginx -s reload
        done &
        exec nginx -g "daemon off;"
      '

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: >
      /bin/sh -c '
      trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot;
        sleep 12h;
      done
      '

  public-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.public.prod
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Production
    restart: always
    depends_on:
      - db
    expose:
      - "5000"

  private-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.private.prod
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      ASPNETCORE_ENVIRONMENT: Production
    restart: always
    depends_on:
      - db
    expose:
      - "5000"

  db:
    image: postgres:17
    command: postgres -c timezone=Asia/Tokyo
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infrastructure/db/init:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5433:5432"

  batch-auto-battle:
    build:
      context: .
      dockerfile: ./batch/AutoBattle/Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}

  batch-guitar-crawler:
    build:
      context: ./batch/webCrawler
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - ./batch/webCrawler/logs:/app/logs
    environment:
      DB_DSN: ${DB_DSN}
      LOGS_PATH: ${LOGS_PATH}
      LOGS_KEEP_COUNT: ${LOGS_KEEP_COUNT}
      PARALLEL_COUNT: ${PARALLEL_COUNT}
    depends_on:
      - db

volumes:
  certbot-etc:
  certbot-var:
