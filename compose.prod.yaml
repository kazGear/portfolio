services:
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
    # 本番では外部公開しない
    # ports:
    #   - "${REACT_PORT}:80"
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
    # 本番では外部公開しない
    # ports:
    #   - "${API_PORT}:5000"
    restart: always

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt

  certbot-renew:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: >
      sh -c "certbot renew --webroot -w /var/lib/letsencrypt && nginx -s reload"

  batch-autobattle:
    build:
      context: .
      dockerfile: ./batch/autoBattle/Dockerfile.prod
    restart: always

volumes:
  certbot-etc:
  certbot-var:
