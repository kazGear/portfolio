server {
    listen 80;
    server_name kazapp-trial.com;
    # return 301 https://$host$request_uri;

    # Let's Encrypt 用
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # SPA 配信用（dist）
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}

