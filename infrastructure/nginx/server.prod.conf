# HTTPSリダイレクト（本番公開時に有効化）

server {
    listen 80;
    server_name kazapp-trial.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}


# HTTPS（本番公開時に有効化）

server {
    listen 443 ssl;
    server_name kazapp-trial.com;

    ssl_certificate     /etc/letsencrypt/live/kazapp-trial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kazapp-trial.com/privkey.pem;

    # セキュリティ対策用HTTPヘッダー MIMEタイプ偽装防止
    add_header X-Content-Type-Options "nosniff" always;
    # iframe埋め込みによるクリックジャッキング防止
    add_header X-Frame-Options "DENY" always;
    # 参照元URL情報の送信を制限
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /public/v1/ {
        proxy_pass http://public-api:5000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://private-api:5000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}